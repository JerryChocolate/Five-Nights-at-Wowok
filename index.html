<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Five Nights at Wowok - Menu</title>
    <style>
        /* --- CSS: Menu Styling & Atmosphere --- */
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-dim: #555555;
            --monospace-font: 'Courier Prime', 'Courier New', Courier, monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            font-family: var(--monospace-font);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container matching the game's aspect ratio */
        #menu-container {
            position: relative;
            width: 100%;
            max-width: 1024px;
            height: 100%;
            max-height: 768px;
            background-image: url('/asset/img/prabowo.jpg'); /* You can swap this for a creepier menu image */
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 10%;
        }

        /* Dark overlay to make text readable and image creepy */
        #darken-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.3) 100%);
            z-index: 1;
        }

        /* TV Scanlines */
        #scanline-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.6;
        }

        /* Static Glitch overlay (faint) */
        #static-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('/asset/gif/static_noise.gif');
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
        }

        /* UI Content Wrapper */
        #content {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Game Title */
        h1 {
            font-size: 4rem;
            margin: 0;
            line-height: 1.1;
            text-shadow: 2px 2px 5px #000;
            letter-spacing: 2px;
        }

        /* Navigation Menu */
        nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 2rem;
            text-align: left;
            cursor: pointer;
            padding: 5px 0;
            position: relative;
            width: fit-content;
            text-shadow: 2px 2px 4px #000;
            transition: color 0.2s;
            text-decoration: none; /* In case we use anchor tags */
        }

        /* The iconic FNAF ">>" hover effect */
        .menu-btn::before {
            content: ">> ";
            position: absolute;
            left: -40px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .menu-btn:hover::before {
            opacity: 1;
        }

        .menu-btn:hover {
            color: #fff;
        }

        /* Disabled Button styling (for Continue if they have no save data) */
        .menu-btn.disabled {
            color: var(--text-dim);
            cursor: not-allowed;
        }
        .menu-btn.disabled::before {
            display: none;
        }

        /* Version / Copyright text */
        #footer-text {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 1rem;
            color: var(--text-dim);
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <div id="darken-overlay"></div>
        <div id="static-overlay"></div>
        <div id="scanline-overlay"></div>

        <div id="content">
            <h1>FIVE NIGHTS<br>AT WOWOK</h1>

            <nav>
                <a href="game.html" class="menu-btn" id="new-game-btn">New Game</a>
                <a href="game.html" class="menu-btn disabled" id="continue-btn">Continue</a>
                <a href="game.html" class="menu-btn disabled" id="night-6-btn">Night 6</a>
            </nav>
        </div>

        <div id="footer-text">v1.0.0</div>
    </div>

    <script>
        // --- JAVASCRIPT: Ambient Audio & Transitions ---
        
        // Optional: Add some creepy ambient noise that plays on the menu
        const AMBIENT_MUSIC = 'https://actions.google.com/sounds/v1/weather/wind_howl_and_howling_wind.ogg';
        const bgm = new Audio(AMBIENT_MUSIC);
        bgm.loop = true;
        bgm.volume = 0.4;

        // Browsers block autoplaying audio, so we wait for the user to click ANYWHERE to start the music
        document.body.addEventListener('click', () => {
            bgm.play().catch(e => console.log("Audio still blocked"));
        }, { once: true }); // Only fires on the very first click

        // Add a click sound when starting a new game
        const startBtn = document.getElementById('new-game-btn');
        startBtn.addEventListener('click', (e) => {
            // We don't prevent default here because we DO want it to go to index.html
            // But we could play a quick sound right before it loads!
            const blip = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            blip.play();
        });
        
        // --- Save Data Logic ---
        const savedNight = parseInt(localStorage.getItem('wowok_save')) || 1;
        const continueBtn = document.getElementById('continue-btn');
        const newGameBtn = document.getElementById('new-game-btn');
        const night6Btn = document.getElementById('night-6-btn');

        // 1. Handle the Continue Button
        if (savedNight > 1) {
            continueBtn.classList.remove('disabled');
            // Cap the continue display at Night 5 (standard FNAF behavior)
            const displayNight = savedNight > 5 ? 5 : savedNight;
            continueBtn.innerText = `Continue (Night ${displayNight})`;
        } else {
            continueBtn.addEventListener('click', (e) => {
                if (continueBtn.classList.contains('disabled')) e.preventDefault();
            });
        }

        // 2. Handle the Secret Night 6 Unlock
        if (savedNight > 5) {
            night6Btn.classList.remove('disabled');
            night6Btn.style.color = '#ff5252'; // Make it glow red so it looks dangerous
            night6Btn.style.textShadow = '0 0 10px #ff0000';
        } else {
            night6Btn.addEventListener('click', (e) => {
                if (night6Btn.classList.contains('disabled')) e.preventDefault();
            });
        }

        // 3. Button Click Events
        newGameBtn.addEventListener('click', () => {
            localStorage.setItem('wowok_save', 1);
            const blip = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            blip.play();
        });

        // Ensure clicking Night 6 forces the game state to 6
        night6Btn.addEventListener('click', (e) => {
             if (!night6Btn.classList.contains('disabled')) {
                 localStorage.setItem('wowok_save', 6);
                 const blip = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
                 blip.play();
             }
        });

        // When clicking New Game, reset the save file back to 1
        newGameBtn.addEventListener('click', () => {
            localStorage.setItem('wowok_save', 1);
            const blip = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
            blip.play();
        });
        // --- 🖼️ ASSET PRELOADER ---
        // List every heavy image your game uses here
        const assetsToPreload = [
            '/asset/img/open_office.png',
            '/asset/img/enemyLeft.png', // Assuming you have .png here!
            '/asset/img/enemyRight.png',
            '/asset/img/leftDoorClosed.png',
            '/asset/img/rightLightEnemy_leftClosed.png',
            '/asset/img/rightDoorClosed.png',
            '/asset/img/leftLightEnemy_rightClosed.png',
            '/asset/img/office.png',
            '/asset/img/prabowo.jpg',
            '/asset/img/cam1.png',
            '/asset/img/cam1_prabowo.png',
            '/asset/img/cam2.png',
            '/asset/img/cam2_prabowo.png',
            '/asset/img/cam3.png',
            '/asset/img/cam3_prabowo.png',
            '/asset/gif/static_noise.gif'
        ];

        // Silently load them into the browser cache
        function preloadAssets(urls) {
            urls.forEach(url => {
                const img = new Image();
                img.src = url;
            });
            console.log("All game assets preloaded to cache.");
        }

        // Fire the preloader the moment the menu finishes loading
        window.addEventListener('load', () => {
            preloadAssets(assetsToPreload);
        });
    </script>
</body>
</html>
